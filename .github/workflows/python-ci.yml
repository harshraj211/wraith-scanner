name: Python CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Compile smoke check
        run: |
          python -m py_compile main.py api_server.py
          python -m py_compile scanner/utils/waf_evasion.py
          python -m py_compile scanner/modules/xss_scanner.py
          python -m py_compile scanner/modules/path_traversal_scanner.py
          python -m py_compile scanner/modules/semgrep_scanner.py

      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -p "test_*.py" -q
